<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>行政與財務流程 AI 自動化｜互動教學工作坊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ============================================================
   * Modern minimal direction（Linear / Vercel 系）
   * 近灰階基底 + 單一飽和藍強調，hairline borders，無陰影
   * ============================================================ */
  :root {
    --bg:      oklch(99% 0.002 240);
    --surface: oklch(100% 0 0);
    --surface-2: oklch(97.5% 0.004 250);
    --fg:      oklch(18% 0.012 250);
    --muted:   oklch(54% 0.012 250);
    --muted-2: oklch(72% 0.01 250);
    --border:  oklch(92% 0.005 250);
    --border-strong: oklch(82% 0.008 250);
    --accent:  oklch(58% 0.18 255);
    --accent-soft: oklch(95% 0.04 255);
    --accent-deep: oklch(45% 0.18 255);
    /* 第二強調色：暖琥珀 — 用於 hero 數字、tip callout、RTFC 標籤
       與藍色 accent 屬補色關係，不互搶但會在版面上形成節奏 */
    --accent-2:      oklch(66% 0.14 65);
    --accent-2-soft: oklch(94% 0.045 65);
    --accent-2-deep: oklch(48% 0.14 60);
    --success: oklch(58% 0.16 145);
    --success-soft: oklch(95% 0.04 145);
    --danger: oklch(60% 0.18 25);
    --danger-soft: oklch(95% 0.05 25);
    --warning: oklch(70% 0.13 75);
    --warning-soft: oklch(95% 0.05 75);

    /* 紋理底：極低密度 dot-grid，給章節 hero 與 sidebar 用，讓平面有觸感
       點 1px、間距 24px、亮度差 ~6%；body 不直接使用，避免閱讀疲勞 */
    --dot-color: oklch(80% 0.005 250 / 0.6);
    --dot-bg: radial-gradient(circle at 1px 1px, var(--dot-color) 1px, transparent 0);

    --font-display: "Nunito", "jf-openhuninn-1.1", "jf-openhuninn", "Gen Jyuu Gothic", "Taipei Sans TC Beta", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    --font-body:    var(--font-display);
    --font-serif:   var(--font-display);
    --font-mono:    var(--font-display);

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;

    --sidebar-w: 268px;
    --header-h: 56px;
    --content-max: 880px;

    /* hover lift 使用的陰影，亮暗模式各自定義 */
    --shadow-lift: 0 6px 18px -10px oklch(20% 0.02 250 / 0.18), 0 2px 4px -2px oklch(20% 0.02 250 / 0.06);
  }

  /* ============================================================
   * Dark theme — 同樣的 modern-minimal 姿態，深底高對比
   * accent 比亮模式提亮 ~12%，否則在深底顯得疲乏
   * ============================================================ */
  [data-theme="dark"] {
    --bg:      oklch(16% 0.014 250);
    --surface: oklch(19.5% 0.014 250);
    --surface-2: oklch(22.5% 0.014 250);
    --fg:      oklch(96% 0.005 250);
    --muted:   oklch(68% 0.012 250);
    --muted-2: oklch(50% 0.012 250);
    --border:  oklch(28% 0.014 250);
    --border-strong: oklch(38% 0.014 250);
    --accent:  oklch(70% 0.17 255);
    --accent-soft: oklch(30% 0.08 255);
    --accent-deep: oklch(82% 0.13 255);
    --accent-2:      oklch(78% 0.13 65);
    --accent-2-soft: oklch(30% 0.075 65);
    --accent-2-deep: oklch(86% 0.12 65);
    --success: oklch(70% 0.16 145);
    --success-soft: oklch(28% 0.07 145);
    --danger: oklch(70% 0.18 25);
    --danger-soft: oklch(28% 0.08 25);
    --warning: oklch(78% 0.13 75);
    --warning-soft: oklch(28% 0.08 75);
    --shadow-lift: 0 8px 22px -10px oklch(0% 0 0 / 0.55), 0 2px 6px -2px oklch(0% 0 0 / 0.3);
    color-scheme: dark;
  }

  /* ===================== reset & base ===================== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  /* 縮放只套用在主內容（.content），側邊選單保持原生尺寸不被放大 */
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
    letter-spacing: -0.005em;
    /* 主題切換時平滑過渡背景與文字色，避免閃白 */
    transition: background-color 220ms ease, color 220ms ease;
  }
  h1,h2,h3,h4 { font-family: var(--font-display); letter-spacing: -0.02em; line-height: 1.25; margin: 0; color: var(--fg); }
  h1 { font-size: 32px; font-weight: 660; }
  h2 { font-size: 24px; font-weight: 600; }
  h3 { font-size: 18px; font-weight: 600; }
  h4 { font-size: 15px; font-weight: 600; }
  p  { margin: 0 0 12px; text-wrap: pretty; }
  a  { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; text-underline-offset: 2px; }
  code, pre { font-family: var(--font-mono); }
  ::selection { background: var(--accent-soft); color: var(--accent-deep); }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* ===================== layout ===================== */
  /* sidebar 採用 fixed 定位（不再依賴 flex + sticky，避免 ancestor overflow 干擾），
     .app 不再是 flex container，由 .main 用 margin-left 讓出 sidebar 寬度。
     注意：不可加 overflow-x: hidden，否則瀏覽器會 implicit 把 overflow-y 設為 auto，
     讓 .app 變成捲軸容器，window 反而不再捲動，導致 topbar sticky 失效。 */
  .app {
    min-height: 100vh;
  }
  .app.sidebar-closed .sidebar {
    /* 用 transform 取代 margin 動畫，避免 reflow，動畫更順 */
    transform: translateX(-100%);
  }

  /* ===================== sidebar ===================== */
  .sidebar {
    /* 真正固定：不隨頁面捲動，且不參與 flex/document flow */
    position: fixed;
    left: 0;
    top: 0;
    width: var(--sidebar-w);
    height: 100vh;
    z-index: 10;
    transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1);
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .brand {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    /* 極淡 dot-grid，僅在 brand 區與 hero 區有紋理 — 內容區保持乾淨 */
    background:
      var(--dot-bg) 0 0 / 20px 20px,
      var(--surface);
  }
  .brand-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .brand-title {
    margin-top: 4px;
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }

  .nav {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px 16px;
    scrollbar-width: thin;
  }
  .nav-section {
    margin-top: 14px;
  }
  .nav-section:first-child { margin-top: 4px; }
  .nav-section-title {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted-2);
    padding: 0 10px 6px;
  }
  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-sm);
    color: var(--fg);
    font-size: 14px;
    line-height: 1.3;
    cursor: pointer;
    user-select: none;
  }
  .nav-link:hover { background: var(--surface-2); text-decoration: none; }
  .nav-link.active {
    background: var(--accent-soft);
    color: var(--accent-deep);
    font-weight: 580;
  }
  .nav-link .nav-num {
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--muted);
    min-width: 32px;
    font-variant-numeric: tabular-nums;
  }
  .nav-link.active .nav-num { color: var(--accent); }
  .nav-link .nav-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted-2);
    font-variant-numeric: tabular-nums;
  }

  .nav-progress {
    border-top: 1px solid var(--border);
    padding: 14px 20px 18px;
    background: var(--surface);
  }
  .nav-progress-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .nav-progress-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .nav-progress-value {
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
  }
  .nav-progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .nav-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 320ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-progress-meta {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .nav-reset {
    margin-top: 10px;
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    color: var(--muted);
    font-size: 11.5px;
    width: 100%;
  }
  .nav-reset:hover { color: var(--danger); border-color: var(--danger); }

  /* ===== sidebar 上的內容縮放控制（控制 .content 的 zoom 變數） ===== */
  .nav-zoom {
    border-top: 1px solid var(--border);
    padding: 12px 20px 14px;
    background: var(--surface);
  }
  .nav-zoom-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .nav-zoom-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .nav-zoom-reset {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--muted);
    border-radius: var(--r-sm);
    width: 22px;
    height: 22px;
    line-height: 1;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .nav-zoom-reset:hover { color: var(--accent); border-color: var(--accent); }
  .nav-zoom-controls {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 6px;
    align-items: stretch;
  }
  .nav-zoom-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    color: var(--fg);
    padding: 6px 0;
    font-size: 16px;
    line-height: 1;
    font-weight: 600;
  }
  .nav-zoom-btn:hover { color: var(--accent); border-color: var(--accent); }
  .nav-zoom-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-zoom-value {
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--fg);
    align-self: center;
    text-align: center;
    min-width: 52px;
  }

  /* ===================== main ===================== */
  /* sidebar 改 fixed 後，.main 用 margin-left 讓出空間；transition 對應 sidebar 動畫 */
  .main {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    min-width: 0;
    display: flex;
    flex-direction: column;
    transition: margin-left 300ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .app.sidebar-closed .main {
    margin-left: 0;
  }
  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    height: var(--header-h);
    background: color-mix(in oklab, var(--bg) 86%, transparent);
    backdrop-filter: saturate(160%) blur(10px);
    -webkit-backdrop-filter: saturate(160%) blur(10px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
  }
  .topbar-trail {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .topbar-trail b { color: var(--fg); font-weight: 600; }
  .topbar-spacer { flex: 1; }
  .topbar-quick {
    display: flex;
    gap: 4px;
  }
  .topbar-quick button {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    color: var(--muted);
    font-size: 12.5px;
  }
  .topbar-quick button:hover { color: var(--fg); border-color: var(--border); }

  /* 主題切換鈕：sun/moon 圖示二態切換 */
  .theme-toggle {
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    color: var(--muted);
    transition: color 160ms ease, border-color 160ms ease, background 160ms ease;
  }
  .theme-toggle:hover { color: var(--fg); border-color: var(--border-strong); background: var(--surface-2); }
  .theme-toggle svg { width: 15px; height: 15px; transition: transform 320ms cubic-bezier(0.4,0,0.2,1), opacity 200ms ease; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: inline-block; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: inline-block; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }

  /* ===================== chapter fade-up（單次入場動畫） ===================== */
  @keyframes chapter-in {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  section.chapter.fade-in {
    animation: chapter-in 480ms cubic-bezier(0.2, 0, 0.2, 1) both;
  }
  /* 尊重使用者的「減少動態效果」偏好 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .prompt-card:hover { transform: none; }
  }

  .content {
    max-width: var(--content-max);
    margin: 0 auto;
    padding: 36px 28px 120px;
    /* 縮放由 sidebar 上的 +/− 控制，透過 CSS 變數 --content-zoom（預設 1.35）；
       sidebar 不受影響 */
    zoom: var(--content-zoom, 1.35);
    transition: max-width 300ms cubic-bezier(0.4, 0, 0.2, 1), padding 300ms ease;
  }
  .app.sidebar-closed .content {
    max-width: 100%;
    padding: 48px 6vw 160px;
  }

  section.chapter {
    scroll-margin-top: 80px;
    margin-bottom: 84px;
  }
  section.chapter > header {
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  section.chapter > header .eyebrow {
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    display: block;
  }
  /* 章節大標 — serif 顯示字，是 modern-minimal 與 editorial 的混搭點 */
  section.chapter > header h2 {
    margin-bottom: 6px;
    font-family: var(--font-serif);
    font-size: 34px;
    font-weight: 540;
    letter-spacing: -0.022em;
    line-height: 1.1;
  }
  section.chapter > header .lead {
    color: var(--muted);
    font-size: 15.5px;
    line-height: 1.7;
    margin-top: 12px;
    max-width: 68ch;
  }

  /* ============================================================
   *  Day chapter hero — 巨型 serif 數字 + dot-grid 紋理底
   *  原則：每個 Day 章節有自己的「封面舞台」，視覺重量集中
   * ============================================================ */
  .day-hero {
    position: relative;
    margin: 0 0 28px;
    padding: 36px 28px 32px;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background:
      var(--dot-bg) 0 0 / 24px 24px,
      linear-gradient(135deg, var(--surface), var(--surface-2));
    overflow: hidden;
    display: grid;
    grid-template-columns: minmax(160px, 28%) minmax(0, 1fr) minmax(220px, 28%);
    align-items: end;
    gap: 32px;
  }
  /* 漸層遮罩讓紋理在右上角更深、左下淡出，給數字一個視覺停泊點 */
  .day-hero::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(
      105deg,
      transparent 0%,
      transparent 45%,
      color-mix(in oklab, var(--surface) 70%, transparent) 100%);
    pointer-events: none;
  }
  .day-hero > * { position: relative; z-index: 1; }
  .day-hero-numeral {
    font-family: var(--font-serif);
    font-size: clamp(120px, 16vw, 200px);
    font-weight: 500;
    line-height: 0.85;
    letter-spacing: -0.05em;
    color: var(--accent-2);
    /* 描邊感：底色微透 + 細邊框，讓數字像印刷大字 */
    -webkit-text-stroke: 0;
    text-shadow: 0 1px 0 color-mix(in oklab, var(--accent-2) 18%, transparent);
    user-select: none;
  }
  .day-hero-numeral .day-hero-num-sub {
    display: block;
    font-size: 0.18em;
    font-family: var(--font-mono);
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 14px;
    line-height: 1.4;
  }
  .day-hero-meta {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .day-hero-eyebrow {
    font-family: var(--font-mono);
    font-size: 11.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .day-hero-title {
    font-family: var(--font-serif);
    font-size: clamp(28px, 3.3vw, 40px);
    font-weight: 540;
    letter-spacing: -0.022em;
    line-height: 1.1;
    color: var(--fg);
  }
  .day-hero-lead {
    color: var(--muted);
    font-size: 14.5px;
    line-height: 1.65;
    max-width: 56ch;
    margin-top: 4px;
  }
  .day-hero-stats {
    display: flex;
    gap: 28px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .day-hero-visual {
    align-self: stretch;
    min-height: 220px;
  }
  .day-hero-stat .stat-label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted-2);
  }
  .day-hero-stat .stat-value {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 540;
    letter-spacing: -0.018em;
    color: var(--fg);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  /* Day 章節有 hero，header 變得簡潔（無底線、字較小） */
  section.chapter.has-hero > header {
    border-bottom: 0;
    padding-bottom: 0;
    margin-bottom: 18px;
  }
  section.chapter.has-hero > header h2 { display: none; }
  section.chapter.has-hero > header .eyebrow { display: none; }
  section.chapter.has-hero > header .lead { margin-top: 0; }

  @media (max-width: 880px) {
    .day-hero {
      grid-template-columns: 1fr;
      padding: 28px 22px 26px;
    }
    .day-hero-numeral {
      font-size: clamp(96px, 22vw, 140px);
    }
    .day-hero-stats {
      flex-wrap: wrap;
      gap: 16px;
    }
    .day-hero-visual {
      min-height: 190px;
    }
  }

  /* 情境圖片：優先使用 IMAGE-2 生成圖，缺圖時退回 inline SVG */
  .scenario-visual {
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background:
      radial-gradient(circle at 18% 18%, var(--accent-soft), transparent 34%),
      linear-gradient(145deg, var(--surface), var(--surface-2));
    box-shadow: inset 0 1px 0 color-mix(in oklab, white 24%, transparent);
    aspect-ratio: 16 / 9;
  }
  .scenario-visual img,
  .scenario-visual svg {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 190px;
    object-fit: cover;
  }
  .scenario-visual figcaption {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: color-mix(in oklab, var(--surface) 88%, transparent);
    backdrop-filter: blur(8px);
    color: var(--fg);
    font-size: 12.5px;
    line-height: 1.35;
  }
  .scenario-visual .visual-kicker {
    flex: 0 0 auto;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--accent-deep);
  }
  .unit-scenario {
    margin: 14px 0 18px;
    min-height: 250px;
  }

  /* ===================== reusable ===================== */

  /* meta info table (overview) */
  .meta-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
    margin: 18px 0 0;
    font-size: 14px;
  }
  .meta-grid > * {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .meta-grid > *:nth-last-child(-n+2) { border-bottom: 0; }
  .meta-grid > div:nth-child(odd) {
    background: var(--surface-2);
    color: var(--muted);
    font-size: 12.5px;
    border-right: 1px solid var(--border);
  }
  .meta-grid > div:nth-child(even) {
    background: var(--surface);
  }

  /* ===================== instructor card ===================== */
  /* 講師卡片：頭像 + 頻道資訊 + 最熱門影片清單 */
  .instructor-card {
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 24px;
    align-items: start;
    padding: 22px;
    margin: 14px 0 0;
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    background: linear-gradient(180deg, var(--accent-soft) 0%, var(--surface) 60%);
  }
  .instructor-avatar {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    background: var(--surface-2);
    box-shadow: 0 6px 20px -6px var(--accent);
    border: 2px solid var(--surface);
  }
  .instructor-meta { min-width: 0; }
  .instructor-name {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0 0 4px;
    letter-spacing: 0.2px;
  }
  .instructor-handle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .instructor-handle a {
    color: var(--accent-deep);
    text-decoration: none;
    border-bottom: 1px dashed var(--accent);
  }
  .instructor-handle a:hover { border-bottom-style: solid; }
  .instructor-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .instructor-stat {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .instructor-stat strong {
    color: var(--accent-deep);
    font-weight: 700;
    margin-right: 4px;
  }
  .instructor-bio {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-primary);
    margin: 0;
  }
  .instructor-source {
    font-size: 11.5px;
    color: var(--muted-2);
    margin-top: 8px;
  }

  /* 最熱門影片清單 */
  .instructor-videos {
    margin-top: 18px;
  }
  .instructor-videos-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin: 0 0 10px;
  }
  .instructor-videos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .instructor-video {
    display: block;
    text-decoration: none;
    color: inherit;
    border-radius: var(--r-md);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .instructor-video:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px -10px var(--accent);
    border-color: var(--accent);
  }
  .instructor-video-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
    background: var(--surface-2);
  }
  .instructor-video-title {
    font-size: 13px;
    line-height: 1.4;
    padding: 10px 12px 6px;
    color: var(--text-primary);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .instructor-video-views {
    font-size: 11.5px;
    color: var(--muted);
    padding: 0 12px 10px;
  }

  /* 響應式：880px 以下改單欄 */
  @media (max-width: 880px) {
    .instructor-card {
      grid-template-columns: 1fr;
      text-align: center;
    }
    .instructor-avatar {
      margin: 0 auto;
      width: 130px;
      height: 130px;
    }
    .instructor-stats { justify-content: center; }
  }

  /* ===================== tool gallery ===================== */
  /* 工具圖鑑：Day 篩選 chip + 工具卡片網格 */
  .toolbox-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 14px 0 18px;
  }
  .toolbox-filters .chip {
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .toolbox-filters .chip:hover { border-color: var(--accent); }
  .toolbox-filters .chip.active {
    background: var(--accent);
    color: var(--surface);
    border-color: var(--accent);
  }

  .toolbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-top: 8px;
  }
  .tool-card {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .tool-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px -10px var(--accent);
    border-color: var(--accent);
  }
  .tool-card.is-hidden { display: none; }

  .tool-screenshot {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    object-position: top;
    background: var(--surface-2);
    display: block;
  }
  .tool-screenshot.is-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 12px;
  }

  .tool-card-body {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .tool-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .tool-tagline {
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--muted);
    flex: 1;
  }
  .tool-days {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .tool-day-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-deep);
    border: 1px solid var(--border);
  }

  /* generic table */
  table.t {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
    margin: 8px 0 16px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
    font-variant-numeric: tabular-nums;
  }
  table.t th, table.t td {
    text-align: left;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  table.t th {
    background: var(--surface-2);
    font-weight: 600;
    font-size: 12.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border-strong);
    letter-spacing: 0.005em;
  }
  table.t tr:last-child td { border-bottom: 0; }
  table.t tr:hover td { background: var(--surface-2); }

  /* simple unordered list */
  ul.list { margin: 8px 0 14px; padding-left: 18px; }
  ul.list li { margin-bottom: 5px; }

  /* key-value list (concept mini-rows) */
  .kv {
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
    margin: 10px 0 16px;
    font-size: 13.5px;
  }
  .kv-row {
    display: grid;
    grid-template-columns: 200px 1fr;
    border-bottom: 1px solid var(--border);
  }
  .kv-row:last-child { border-bottom: 0; }
  .kv-key {
    padding: 9px 14px;
    background: var(--surface-2);
    color: var(--muted);
    font-size: 12.5px;
    font-weight: 500;
    border-right: 1px solid var(--border);
  }
  .kv-val { padding: 9px 14px; }

  /* note callout */
  .note {
    margin: 10px 0 14px;
    padding: 10px 14px;
    background: var(--accent-soft);
    border-left: 2px solid var(--accent);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
    color: var(--accent-deep);
    font-size: 13.5px;
  }
  .note::before {
    content: "重點 ／ ";
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  /* tip 變體：用第二強調色 accent-2（暖琥珀）— 提示性質的內容（堆疊機制、心法、口訣）
     與重點藍區分，掃描頁面時自然分群 */
  .note.tip {
    background: var(--accent-2-soft);
    border-left-color: var(--accent-2);
    color: var(--accent-2-deep);
  }
  .note.tip::before { content: "Tip ／ "; }

  /* heading inside chapters — H3 也用 serif 維持節奏，H4 維持 mono uppercase 標籤感 */
  .chapter h3 {
    margin: 32px 0 12px;
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 540;
    letter-spacing: -0.015em;
    line-height: 1.25;
  }
  .chapter h4 { margin: 18px 0 8px; color: var(--muted); font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }

  /* concept block */
  .concept { margin-top: 18px; }
  .concept-heading {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 540;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .concept-body { color: var(--muted); margin-bottom: 8px; }

  /* ===================== unit accordion ===================== */
  .unit {
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    margin-bottom: 16px;
    background: var(--surface);
    overflow: hidden;
  }
  .unit summary {
    list-style: none;
    cursor: pointer;
    padding: 18px 22px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    user-select: none;
  }
  .unit summary::-webkit-details-marker { display: none; }
  .unit summary:hover { background: var(--surface-2); }
  .unit-title {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 540;
    letter-spacing: -0.012em;
    line-height: 1.25;
  }
  .unit-meta {
    margin-top: 4px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
  }
  .unit-progress {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .unit-progress-pill {
    font-family: var(--font-mono);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 10px;
  }
  .unit-progress-pill.done {
    color: var(--success);
    background: var(--success-soft);
    border-color: color-mix(in oklab, var(--success) 20%, transparent);
  }
  .unit-arrow {
    width: 14px; height: 14px;
    color: var(--muted-2);
    transition: transform 200ms;
  }
  details[open] .unit-arrow { transform: rotate(90deg); }
  .unit-body {
    padding: 4px 22px 22px;
    border-top: 1px solid var(--border);
  }

  /* ===================== task list ===================== */
  .task-list {
    margin: 6px 0 4px;
    padding: 0;
    list-style: none;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
  }
  .task-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background 100ms;
  }
  .task-item:last-child { border-bottom: 0; }
  .task-item:hover { background: var(--surface-2); }
  .task-checkbox {
    flex: 0 0 18px;
    width: 18px; height: 18px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    transition: background 120ms, border-color 120ms;
  }
  .task-thumb {
    flex: 0 0 48px;
    width: 48px;
    height: 48px;
    margin-top: 1px;
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: linear-gradient(145deg, var(--accent-soft), var(--surface-2));
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-deep);
  }
  .task-thumb svg {
    width: 34px;
    height: 34px;
  }
  .task-checkbox svg { width: 12px; height: 12px; opacity: 0; transition: opacity 120ms; }
  .task-item.done .task-checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .task-item.done .task-checkbox svg { opacity: 1; color: white; }
  .task-item.done .task-label {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--muted-2);
  }
  .task-label {
    flex: 1;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ===================== prompt card ===================== */
  .prompt-card {
    margin: 12px 0 14px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
    background: var(--surface);
    /* hover 時微浮 — 暗示這張卡是可互動的（內含複製按鈕） */
    transition: transform 180ms cubic-bezier(0.4,0,0.2,1),
                box-shadow 180ms cubic-bezier(0.4,0,0.2,1),
                border-color 180ms ease;
  }
  .prompt-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-lift);
    border-color: var(--border-strong);
  }
  .prompt-card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .prompt-card-title {
    font-weight: 600;
    font-size: 14.5px;
    line-height: 1.4;
  }
  .prompt-card-note {
    margin-top: 3px;
    font-size: 12.5px;
    color: var(--muted);
  }
  .prompt-copy-btn {
    flex: 0 0 auto;
    padding: 5px 10px;
    border: 1px solid var(--border-strong);
    border-radius: var(--r-sm);
    background: var(--surface);
    color: var(--fg);
    font-size: 12px;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .prompt-copy-btn:hover { border-color: var(--accent); color: var(--accent-deep); background: var(--accent-soft); }
  .prompt-copy-btn.ok { border-color: var(--success); color: var(--success); background: var(--success-soft); }
  .prompt-copy-btn svg { width: 12px; height: 12px; }
  .prompt-text {
    margin: 0;
    padding: 14px 16px 16px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: 1.7;
    background: var(--surface);
    color: var(--fg);
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-x: auto;
    tab-size: 2;
  }

  /* ===================== materials list ===================== */
  .materials {
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    overflow: hidden;
    margin: 8px 0 4px;
    background: var(--surface);
  }
  .material-row {
    display: grid;
    /* 第一欄 70px 容納 "PDF 文件" / "TEXT" / "CSV" 不換行 */
    grid-template-columns: 70px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
  }
  .material-row:last-child { border-bottom: 0; }
  .material-row:hover { background: var(--surface-2); }
  .material-tag {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-align: center;
    padding: 3px 6px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    white-space: nowrap;
  }
  .material-name {
    font-weight: 500;
    color: var(--fg);
    line-height: 1.35;
  }
  .material-desc {
    margin-top: 2px;
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.45;
  }
  .material-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted-2);
    text-align: right;
  }

  /* ===================== tag pills ===================== */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.02em;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--muted);
    white-space: nowrap;
  }
  .pill.accent { background: var(--accent-soft); border-color: color-mix(in oklab, var(--accent) 20%, transparent); color: var(--accent-deep); }
  .pill.amber { background: var(--accent-2-soft); border-color: color-mix(in oklab, var(--accent-2) 22%, transparent); color: var(--accent-2-deep); }
  .pill.success { background: var(--success-soft); border-color: color-mix(in oklab, var(--success) 25%, transparent); color: var(--success); }

  /* ===================== brand cards ===================== */
  .brand-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 12px;
  }
  .brand-card {
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    background: var(--surface);
    overflow: hidden;
  }
  .brand-visual {
    position: relative;
    aspect-ratio: 1 / 1;
    border-bottom: 1px solid var(--border);
    background:
      radial-gradient(circle at 18% 18%, var(--accent-soft), transparent 34%),
      linear-gradient(145deg, var(--surface), var(--surface-2));
  }
  .brand-visual img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .brand-card-body {
    padding: 18px 20px;
  }
  .brand-card .brand-id {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand-card .brand-name {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .brand-card .brand-type {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .brand-card .brand-rows {
    border-top: 1px solid var(--border);
  }
  .brand-card .brand-row {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .brand-card .brand-row:last-child { border-bottom: 0; }
  .brand-card .brand-row > div:first-child { color: var(--muted); font-size: 12px; }

  .role-cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-top: 12px;
  }
  .role-card {
    min-width: 0;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    background: var(--surface);
    overflow: hidden;
  }
  .role-portrait {
    height: 220px;
    padding: 16px 18px 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    background:
      radial-gradient(circle at 50% 26%, var(--accent-soft), transparent 42%),
      linear-gradient(180deg, var(--surface-2), var(--surface));
  }
  .role-portrait img {
    display: block;
    max-width: 100%;
    max-height: 215px;
    object-fit: contain;
    filter: drop-shadow(0 18px 24px color-mix(in oklab, black 16%, transparent));
  }
  .role-card-body {
    padding: 14px 16px 16px;
    border-top: 1px solid var(--border);
  }

  /* ===================== quiz ===================== */
  .quiz-intro {

  .quiz-stat-value.fail { color: var(--danger); }

  .quiz-actions { display: flex; gap: 10px; margin-bottom: 24px; }
  .btn {
    padding: 9px 16px;
    border-radius: var(--r-sm);
    font-size: 13.5px;
    font-weight: 540;
    border: 1px solid var(--border-strong);
    background: var(--surface);

    transition: all 120ms;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-deep); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn.primary:hover { background: var(--accent-deep); border-color: var(--accent-deep); color: white; }
  .btn.ghost {
    border-color: transparent;

  .q-num {

  .q-option:hover { background: var(--surface-2); border-color: var(--border-strong); }
  .q-option-mark {
    flex: 0 0 18px;
    width: 18px; height: 18px;
    border: 1.5px solid var(--border-strong);

    margin-top: 1px;

  .q-option[data-multi="true"] .q-option-mark { border-radius: 4px; }
  .q-option-mark::after {
    content: "";
    width: 8px; height: 8px;
    border-radius: inherit;
    background: var(--accent);
    transform: scale(0);
    transition: transform 100ms;
  }
  .q-option.checked .q-option-mark { border-color: var(--accent); }
  .q-option.checked .q-option-mark::after { transform: scale(1); }
  .q-option.correct {
    border-color: var(--success);
    background: var(--success-soft);
  }
  .q-option.correct .q-option-mark { border-color: var(--success); }
  .q-option.correct .q-option-mark::after { background: var(--success); transform: scale(1); }
  .q-option.wrong {
    border-color: var(--danger);
    background: var(--danger-soft);
  }
  .q-option.wrong .q-option-mark { border-color: var(--danger); }
  .q-option.wrong .q-option-mark::after { background: var(--danger); transform: scale(1); }
  .q-feedback {
    margin-top: 12px;
    padding: 9px 12px;
    border-radius: var(--r-sm);

  }
  .q-feedback.ok { background: var(--success-soft); color: var(--success); }
  .q-feedback.no { background: var(--danger-soft); color: var(--danger); }

  /* ===================== misc ===================== */
  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;

  .stat-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stat-value {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 540;
    letter-spacing: -0.022em;
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
  }
  .stat-meta {
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .day-header-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin: 18px 0 4px;
  }
  .dh-cell {
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 12px 14px;
    background: var(--surface);
  }
  .dh-cell .stat-value { font-size: 18px; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--fg);
    color: var(--bg);
    padding: 9px 16px;
    border-radius: 999px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 240ms cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  hr.div {
    border: 0;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  /* responsive small adjustments — desktop-first as briefed */
  @media (max-width: 1100px) {
    :root { --sidebar-w: 240px; --content-max: 760px; }

</style>

<!-- ============================================================
     APP LOGIC — 渲染 + 互動 + 進度持久化
     ============================================================ -->
<script>
(() => {
  'use strict';

  // ---------- localStorage 包裝（容錯）----------
  const STORAGE_KEY = 'mor3xppa-progress-v1';
  const store = {
    load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { tasks: {}, quiz: {}, lastSection: '' };
        return JSON.parse(raw);
      } catch (e) { return { tasks: {}, quiz: {}, lastSection: '' }; }
    },
    save(state) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (e) { /* 隱私模式 / iframe 限制：靜默失敗 */ }
    },
    reset() {
      try { localStorage.removeItem(STORAGE_KEY); }
      catch (e) { /* ignore */ }
    }
  };

  let state = store.load();
  state.tasks = state.tasks || {};
  state.quiz = state.quiz || {};

  const C = window.COURSE;

  // ---------- 學員可見性開關 ----------
  // 對學員隱藏「前後測機制」與「結訓證書要件」這兩塊資訊。
  // 未來若改回對學員揭露：把對應 flag 改 true 即可（資料仍保留在 course-data.js）。
  const SHOW_QUIZ = false;                  // 結訓測驗章節（後測本身）
  const SHOW_COMPLETION_REQUIREMENTS = false; // 「結訓條件」H3 + list（出席率、前後測等門檻）

  // ---------- 工具函式 ----------
  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  // ---------- Sidebar Toggle ----------
  const sidebarToggleBtn = $('#sidebar-toggle');
  if (sidebarToggleBtn) {
    sidebarToggleBtn.addEventListener('click', () => {
      $('.app').classList.toggle('sidebar-closed');
    });
  }

  // ---------- 內容縮放控制（透過 CSS 變數 --content-zoom 套到 .content） ----------
  // sidebar 本身不受影響（CSS 寫死 sidebar 沒套用此變數）；用 localStorage 持久化使用者偏好
  const ZOOM_KEY = 'content-zoom-v1';
  const ZOOM_DEFAULT = 1.35;
  const ZOOM_MIN = 0.8;
  const ZOOM_MAX = 1.8;
  const ZOOM_STEP = 0.05;
  // 讀取使用者上次設定；損壞或超界時 fallback 預設值
  const loadZoom = () => {
    const raw = parseFloat(localStorage.getItem(ZOOM_KEY));
    if (!Number.isFinite(raw) || raw < ZOOM_MIN || raw > ZOOM_MAX) return ZOOM_DEFAULT;
    return raw;
  };
  let currentZoom = loadZoom();
  const zoomPctEl = $('#zoom-pct');
  const zoomInBtn = $('#zoom-in');
  const zoomOutBtn = $('#zoom-out');
  const zoomResetBtn = $('#zoom-reset');
  // 將縮放值套用到 :root 並更新 UI（含端點按鈕 disabled 狀態）
  const applyZoom = (z) => {
    // 浮點誤差修正：四捨五入到 step 倍數
    z = Math.round(z / ZOOM_STEP) * ZOOM_STEP;
    z = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z));
    currentZoom = z;
    document.documentElement.style.setProperty('--content-zoom', z.toString());
    if (zoomPctEl) zoomPctEl.textContent = Math.round(z * 100) + '%';
    if (zoomOutBtn) zoomOutBtn.disabled = z <= ZOOM_MIN + 1e-6;
    if (zoomInBtn) zoomInBtn.disabled = z >= ZOOM_MAX - 1e-6;
    try { localStorage.setItem(ZOOM_KEY, z.toString()); } catch { /* 隱私模式 */ }
  };
  if (zoomInBtn) zoomInBtn.addEventListener('click', () => applyZoom(currentZoom + ZOOM_STEP));
  if (zoomOutBtn) zoomOutBtn.addEventListener('click', () => applyZoom(currentZoom - ZOOM_STEP));
  if (zoomResetBtn) zoomResetBtn.addEventListener('click', () => applyZoom(ZOOM_DEFAULT));
  applyZoom(currentZoom); // 初次套用
  const el = (tag, attrs = {}, ...children) => {
    const node = document.createElement(tag);
    for (const [k, v] of Object.entries(attrs)) {
      if (k === 'class') node.className = v;
      else if (k === 'html') node.innerHTML = v;
      else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
      else if (v != null) node.setAttribute(k, v);
    }
    for (const c of children) {
      if (c == null) continue;
      node.append(c instanceof Node ? c : document.createTextNode(c));
    }
    return node;
  };
  /**
   * 依素材名稱與類型回傳實際檔案 URL
   * - type === 'PDF 文件' → 直接連到 pdf/ 子資料夾下的 PDF 檔（搭配 <a download> 觸發下載）
   * - 其餘類型 → 對應到拆分後的單一素材檔（老闆口語稿 / 會議逐字稿 / 客訴 / Skill YAML 等）
   * @param {string} name 素材顯示名稱
   * @param {string} [type] 素材類型（PDF 文件 / TEXT / CSV / YAML / MD）
   */
  function getMaterialUrl(name, type) {
    // PDF 文件 → 對應 pdf/ 資料夾下的實體 PDF（會被加上 download 屬性）
    if (type === 'PDF 文件') {
      const pdfBase = '完整課程包/教學素材/pdf/';
      if (name.includes('員工差勤')) return pdfBase + '綠野選物_員工差勤與休假管理辦法.pdf';
      if (name.includes('教育訓練')) return pdfBase + '綠野選物_新進員工教育訓練手冊.pdf';
      if (name.includes('新品上架')) return pdfBase + '綠野選物_新品上架公告作業辦法.pdf';
      if (name.includes('FAQ官方版') || name.includes('FAQ 官方版')) return pdfBase + '暖光咖啡_FAQ官方版.pdf';
      if (name.includes('退換貨')) return pdfBase + '暖光咖啡_商品退換貨政策.pdf';
      if (name.includes('客訴處理')) return pdfBase + '暖光咖啡_客訴處理SOP.pdf';
      if (name.includes('進貨與庫存')) return pdfBase + '暖光咖啡_食材進貨與庫存管理辦法.pdf';
      if (name.includes('公司費用')) return pdfBase + '公司費用報支管理辦法.pdf';
      // 課堂實作素材_Day1 / Day2 / Day3 — 預設給 Day1，學員可從 pdf/ 同層找到其他兩份
      if (name.includes('實作素材_Day1') || name.includes('課堂實作素材')) return pdfBase + '課堂實作素材_Day1.pdf';
    }
    // 拆分後的單獨素材（每個只看自己這一份）
    if (name.includes('品牌調性')) return '完整課程包/教學素材/品牌調性指南.md';
    if (name.includes('老闆口語稿')) return '完整課程包/教學素材/老闆口語稿.md';
    if (name.includes('爛提示詞')) return '完整課程包/教學素材/3段爛提示詞.md';
    if (name.includes('會議錄音逐字稿') || name.includes('錄音逐字稿')) return '完整課程包/教學素材/會議錄音逐字稿範本.md';
    if (name.includes('請購單')) return '完整課程包/教學素材/亂格式請購單.csv';
    if (name.includes('客訴 10 則') || name.includes('雜亂客訴')) return '完整課程包/教學素材/雜亂客訴10則.md';
    if (name.includes('Skill 範本')) return '完整課程包/教學素材/發票自動整理_Skill範本.yaml';
    // 教學素材的 .md 全文版（未指定 PDF type 時 fallback 到 .md，例如總覽表格、講師備課用）
    if (name.includes('員工差勤')) return '完整課程包/教學素材/綠野選物_員工差勤與休假管理辦法.md';
    if (name.includes('教育訓練')) return '完整課程包/教學素材/綠野選物_新進員工教育訓練手冊.md';
    if (name.includes('新品上架')) return '完整課程包/教學素材/綠野選物_新品上架公告作業辦法.md';
    if (name.includes('FAQ官方版') || name.includes('FAQ 官方版')) return '完整課程包/教學素材/暖光咖啡_FAQ官方版.md';
    if (name.includes('退換貨')) return '完整課程包/教學素材/暖光咖啡_商品退換貨政策.md';
    if (name.includes('客訴處理')) return '完整課程包/教學素材/暖光咖啡_客訴處理SOP.md';
    if (name.includes('進貨與庫存')) return '完整課程包/教學素材/暖光咖啡_食材進貨與庫存管理辦法.md';
    if (name.includes('公司費用')) return '完整課程包/教學素材/公司費用報支管理辦法.md';
    if (name.includes('實作素材_Day1') || name.includes('課堂實作素材')) return '完整課程包/教學素材/課堂實作素材_Day1.md';
    if (name.includes('課程輔助文件')) return '完整課程包/課程輔助文件.md';
    if (name.includes('共用案例設定')) return '完整課程包/共用案例設定.md';
    return null;
  }

  const escapeHTML = s => String(s).replace(/[&<>"']/g, ch => (
    { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch]
  ));

  // ---------- 收集所有任務 id ----------
  const allTaskIds = (() => {
    const ids = [];
    ['day1','day2','day3','day4'].forEach(dk => {
      (C[dk].units || []).forEach(u => (u.tasks || []).forEach(t => ids.push(t.id)));
    });
    return ids;
  })();

  // ---------- 進度計算 ----------
  function computeProgress() {
    const done = allTaskIds.filter(id => state.tasks[id]).length;
    return { done, total: allTaskIds.length, pct: allTaskIds.length ? Math.round(done / allTaskIds.length * 100) : 0 };
  }

  function unitProgress(dayId, unitId) {
    const day = C[dayId];
    if (!day) return { done: 0, total: 0 };
    const unit = (day.units || []).find(u => u.id === unitId);
    if (!unit) return { done: 0, total: 0 };
    const ids = (unit.tasks || []).map(t => t.id);
    const done = ids.filter(id => state.tasks[id]).length;
    return { done, total: ids.length };
  }

  function updateProgressUI() {
    const p = computeProgress();
    $('#prog-pct').textContent = p.pct + '%';
    $('#prog-fill').style.width = p.pct + '%';
    $('#prog-meta').textContent = `${p.done} / ${p.total} 任務完成`;
    // 更新所有單元 pill
    $$('.unit-progress-pill').forEach(pill => {
      const [dayId, unitId] = pill.dataset.unit.split(':');
      const up = unitProgress(dayId, unitId);
      pill.textContent = `${up.done} / ${up.total}`;
      pill.classList.toggle('done', up.total > 0 && up.done === up.total);
    });
  }

    const t = $('#toast');

  function renderScenarioVisual(key, extraClass = '') {
    const visual = SCENARIO_VISUALS[key];
    if (!visual) return null;
    const figure = el('figure', { class: ['scenario-visual', extraClass].filter(Boolean).join(' ') });
    if (visual.src) {
      figure.append(el('img', {
        src: visual.src,
        alt: visual.caption,
        loading: extraClass.includes('day-hero-visual') ? 'eager' : 'lazy',
        decoding: 'async'
      }));
    } else {
      figure.innerHTML = scenarioSvg(visual.type, visual.caption);
    }
    figure.append(el('figcaption', {},
      el('span', { class: 'visual-kicker' }, visual.kicker),
      el('span', {}, visual.caption)
    ));
    return figure;
  }

  function renderOverview() {
    const m = C.meta;
    const root = el('section', { class: 'chapter', id: 'overview' });

    root.append(el('header', {},
      el('span', { class: 'eyebrow' }, '工作坊總覽'),
      el('h2', {}, m.title),
      el('div', { class: 'lead' }, m.subtitle + '。本互動工作坊把 4 天課程拆成可勾選的任務、可一鍵複製的 RTFC 提示詞，以及可帶回公司的素材清單 — 邊看邊做、隨時回來接續。')
    ));

    // 三格統計卡
    const totalClassHours = m.days.reduce((acc, d) => acc + d.hours, 0);
    root.append(el('div', { class: 'day-header-grid' },
      statCell('總時數', `${totalClassHours + 4}H`, '4 天 + 4H 線上自學'),
      statCell('任務數', String(allTaskIds.length), '可勾選追蹤'),
      statCell('教學素材', String(C.materials.length), '規章 + Skill 範本')
    ));

    root.append(el('h3', {}, '課程基本資訊'));
    const meta = el('div', { class: 'meta-grid' });
    [
      ['計畫名稱', m.program],
      ['主辦單位', m.organizer],
      ['上課日期', m.dates],
      ['上課地點', m.location],
      ['課程型態', m.format],
      ['招生人數', m.capacity],
      ['授課講師', m.instructor]
    ].forEach(([k,v]) => { meta.append(el('div',{},k), el('div',{},v)); });
    root.append(meta);

    root.append(el('h3', {}, '整體課程目標'));
    const goalList = el('ul', { class: 'list' });
    m.objectives.forEach(o => goalList.append(el('li',{},o)));
    root.append(goalList);

    root.append(el('h3', {}, '4 天節次'));
    const t = el('table', { class: 't' });
    t.innerHTML = `<thead><tr><th>日次</th><th>日期</th><th>主題</th><th>時數</th></tr></thead>`;
    const tb = el('tbody');
    m.days.forEach(d => {
      tb.innerHTML += `<tr><td>Day ${d.n}</td><td>${d.date}</td><td>${d.title}</td><td>${d.hours}H</td></tr>`;
    });
    t.append(tb);
    root.append(t);

    // 講師卡片：來自 instructor-data.js (Playwright 爬 YouTube @pg-kt)
    if (window.INSTRUCTOR && window.INSTRUCTOR.channel) {
      root.append(el('h3', {}, '授課講師'));
      root.append(renderInstructorCard(window.INSTRUCTOR));
    }

    // 結訓條件（含出席率與前後測門檻）— 對學員隱藏，由 SHOW_COMPLETION_REQUIREMENTS 控制
    if (SHOW_COMPLETION_REQUIREMENTS) {
      root.append(el('h3', {}, '結訓條件'));
      const ul = el('ul', { class: 'list' });
      m.completion.forEach(c => ul.append(el('li',{},c)));
      root.append(ul);
    }

    return root;
  }

  /**
   * 渲染講師卡片
   * 頭像使用本地檔案 圓形去背.png；頻道資訊與影片清單來自 Playwright 擷取的資料
   */
  function renderInstructorCard(data) {
    const ch = data.channel;
    const card = el('div', { class: 'instructor-card' });

    // 左側：本地圓形頭像 logo
    card.append(el('img', {
      class: 'instructor-avatar',
      src: encodeURIComponent('圓形去背.png'), // 中文檔名 URL-encode
      alt: ch.name || '講師頭像',
      loading: 'lazy'
    }));

    // 右側：講師基本資訊
    const meta = el('div', { class: 'instructor-meta' });
    meta.append(el('div', { class: 'instructor-name' }, ch.name || '講師'));

    // 頻道 handle 連結
    const handleRow = el('div', { class: 'instructor-handle' });
    handleRow.append(document.createTextNode('YouTube 頻道：'));
    const link = el('a', { href: ch.url, target: '_blank', rel: 'noopener' }, ch.handle || ch.name);
    handleRow.append(link);
    meta.append(handleRow);

    // 訂閱 / 影片數徽章
    const stats = el('div', { class: 'instructor-stats' });
    if (ch.subscriberCount) {
      stats.append(el('span', { class: 'instructor-stat' },
        el('strong', {}, '訂閱'), ch.subscriberCount.replace(/位訂閱者|subscribers?/gi, '').trim()));
    }
    if (ch.videoCount) {
      // YouTube 原字串如「117 部影片」，前綴 strong 已含「影片」字樣，去掉以避免重複
      const cleanVideoCount = ch.videoCount.replace(/部影片|videos?/gi, '').trim();
      stats.append(el('span', { class: 'instructor-stat' },
        el('strong', {}, '影片'), cleanVideoCount));
    }
    if (stats.children.length) meta.append(stats);

    // 簡介
    if (ch.description) {
      meta.append(el('p', { class: 'instructor-bio' }, ch.description));
    }

    // 資料來源時間
    if (data.scrapedAt) {
      const date = new Date(data.scrapedAt).toLocaleDateString('zh-TW');
      meta.append(el('div', { class: 'instructor-source' }, `資料擷取自 YouTube · ${date}`));
    }

    card.append(meta);

    // 最熱門影片區塊（橫跨兩欄，故另起一個容器附加在 card 後面）
    const wrapper = el('div', {});
    wrapper.append(card);

    if (Array.isArray(data.recentVideos) && data.recentVideos.length) {

  // ---------- 單元 accordion ----------
  function renderUnit(day, u) {

      body.append(el('h4', {}, '學習目標'));

      u.goals.forEach(g => ul.append(el('li',{},g)));
      body.append(ul);
    }

    const unitVisualKey = `${day.id}-${u.id}`;
    const unitVisual = renderScenarioVisual(unitVisualKey, 'unit-scenario');
    if (unitVisual) body.append(unitVisual);

    // 核心觀念

      body.append(el('h4', {}, '核心觀念'));
      u.concepts.forEach(c => body.append(renderConcept(c)));

    // 提示詞範例

  // ---------- concept ----------
  function renderConcept(c) {
    const w = el('div', { class: 'concept' });
    if (c.heading) w.append(el('div', { class: 'concept-heading' }, c.heading));
    if (c.body) w.append(el('div', { class: 'concept-body' }, c.body));
    if (c.list && c.list.length) {
      const kv = el('div', { class: 'kv' });
      c.list.forEach(([k,v]) => {
        const row = el('div', { class: 'kv-row' });
        row.append(el('div', { class: 'kv-key' }, k));
        row.append(el('div', { class: 'kv-val' }, v));
        kv.append(row);
      });
      w.append(kv);
    }
    if (c.table) {
      const t = el('table', { class: 't' });
      t.innerHTML = '<thead><tr>' + c.table.head.map(h => `<th>${h}</th>`).join('') + '</tr></thead>';
      const tb = el('tbody');
      c.table.rows.forEach(r => tb.innerHTML += '<tr>' + r.map(c => `<td>${c}</td>`).join('') + '</tr>');
      t.append(tb);
      w.append(t);
    }
    if (c.note) w.append(el('div', { class: 'note' }, c.note));

  // ---------- prompt card ----------
  function renderPromptCard(p) {
    const w = el('div', { class: 'prompt-card', id: p.id });
    const head = el('div', { class: 'prompt-card-head' });
    const left = el('div');
    left.append(el('div', { class: 'prompt-card-title' }, p.title));
    if (p.note) left.append(el('div', { class: 'prompt-card-note' }, p.note));
    head.append(left);

    const btn = el('button', { class: 'prompt-copy-btn', type: 'button' });
    btn.innerHTML = ICON.copy + '<span>複製</span>';
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      try {
        await navigator.clipboard.writeText(p.text);
      } catch (err) {
        // fallback: textarea select
        const ta = document.createElement('textarea');
        ta.value = p.text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        ta.remove();
      }
      btn.classList.add('ok');
      btn.querySelector('span').textContent = '已複製';
      toast('已複製：' + p.title);
      setTimeout(() => {
        btn.classList.remove('ok');
        btn.querySelector('span').textContent = '複製';
      }, 1800);
    });
    head.append(btn);
    w.append(head);

    w.append(el('pre', { class: 'prompt-text' }, p.text));
    return w;
  }

  // ---------- task list ----------
  function renderTaskList(tasks) {
    const list = el('ul', { class: 'task-list' });
    tasks.forEach((t, index) => {
      const li = el('li', { class: 'task-item' + (state.tasks[t.id] ? ' done' : ''), 'data-task-id': t.id });
      const cb = el('div', { class: 'task-checkbox', html: ICON.check });
      const thumb = el('div', { class: 'task-thumb', html: taskThumbSvg(index) });
      const lbl = el('div', { class: 'task-label' }, t.label);
      li.append(cb, thumb, lbl);
      li.addEventListener('click', () => toggleTask(t.id, li));
      list.append(li);
    });
    return list;
  }

  function toggleTask(id, li) {
    const next = !state.tasks[id];
    if (next) state.tasks[id] = true;
    else delete state.tasks[id];
    li.classList.toggle('done', next);
    store.save(state);
    updateProgressUI();
  }

  // ---------- material list ----------
  function renderMaterialList(items) {
    const w = el('div', { class: 'materials' });
    items.forEach(m => {
      const row = el('div', { class: 'material-row' });
      row.append(el('div', { class: 'material-tag' }, m.type));
      const center = el('div');
      const url = getMaterialUrl(m.name, m.type);
      if (url) {
        // PDF 文件用 download 屬性觸發下載（其他類型仍是 target=_blank 開新分頁檢視）
        const linkAttrs = { class: 'material-name', href: url };
        if (m.type === 'PDF 文件') linkAttrs.download = '';
        else linkAttrs.target = '_blank';
        const link = el('a', linkAttrs, m.name);
        link.style.color = 'var(--accent-deep)';
        link.style.textDecoration = 'none';
        center.append(link);
      } else {
        center.append(el('div', { class: 'material-name' }, m.name));
      }
      if (m.desc) center.append(el('div', { class: 'material-desc' }, m.desc));
      row.append(center);
      const meta = el('div', { class: 'material-meta' }, '_extracted/完整課程包/教學素材/');
      row.append(meta);
      w.append(row);
    });
    return w;
  }

  // ============================================================
  function renderToolbox() {
    const root = el('section', { class: 'chapter', id: 'toolbox' });
    root.append(el('header', {},
      el('span', { class: 'eyebrow' }, '4 天課程使用工具'),
      el('h2', {}, '工具圖鑑'),
      el('div', { class: 'lead' }, '4 天課程會用到的 AI 工具一覽。點擊任一張卡片開啟官方頁面；用上方 Day 篩選快速找到當日工具。')
    ));

    // 若資料未載入或為空，顯示提示
    if (!Array.isArray(window.TOOLS) || window.TOOLS.length === 0) {
      root.append(el('div', { class: 'note' },
        '工具資料尚未擷取。請執行：npm run scrape:tools'));
      return root;
    }

    // Day 篩選 chips
    const filters = el('div', { class: 'toolbox-filters' });
    const days = ['all', 1, 2, 3, 4];
    days.forEach(d => {
      const label = d === 'all' ? '全部' : `Day ${d}`;
      const chip = el('button', { class: 'chip' + (d === 'all' ? ' active' : ''), 'data-day': String(d) }, label);
      chip.addEventListener('click', () => {
        // 切換 active
        filters.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        // 篩選卡片
        const current = chip.dataset.day;
        grid.querySelectorAll('.tool-card').forEach(card => {
          const cardDays = (card.dataset.days || '').split(' ').filter(Boolean);
          const visible = current === 'all' || cardDays.includes(current);
          card.classList.toggle('is-hidden', !visible);
        });
      });
      filters.append(chip);
    });
    root.append(filters);

    // 卡片網格
    const grid = el('div', { class: 'toolbox-grid' });
    window.TOOLS.forEach(t => grid.append(renderToolCard(t)));
    root.append(grid);

    return root;
  }

    // 截圖（失敗時顯示文字 placeholder）
    if (tool.screenshot && tool.scrapeStatus === 'ok') {
      card.append(el('img', {
        class: 'tool-screenshot',
        src: tool.screenshot,
        alt: tool.name,
        loading: 'lazy'
      }));
    } else {
      card.append(el('div', { class: 'tool-screenshot is-placeholder' },
        '（截圖待擷取）'));
    }

    const body = el('div', { class: 'tool-card-body' });
    body.append(el('div', { class: 'tool-name' }, tool.name));
    body.append(el('div', { class: 'tool-tagline' }, tool.tagline || ''));
    if (days.length) {
      const tagWrap = el('div', { class: 'tool-days' });
      days.forEach(d => tagWrap.append(el('span', { class: 'tool-day-tag' }, `Day ${d}`)));
      body.append(tagWrap);
    }
    card.append(body);
    return card;
  }

  // ============================================================
  //  區塊：結訓測驗
  // ============================================================
  function renderQuiz() {
    const root = el('section', { class: 'chapter', id: 'quiz' });
    root.append(el('header', {},
      el('span', { class: 'eyebrow' }, '結訓條件 ／ 課後小測驗'),
      el('h2', {}, '結訓測驗（8 題）'),
      el('div', { class: 'lead' }, '完成 4 天課程後的小測驗，達 75 分（8 題答對 6 題以上）即達結訓標準。作答即時批改、結果會記在你的瀏覽器，下次回來可直接看到分數。')
    ));

    // 統計頂部
    const intro = el('div', { class: 'quiz-intro' });
    const introLeft = el('div', {});
    introLeft.append(el('div', { class: 'stat-label' }, '結訓門檻'));
    introLeft.append(el('div', { style: 'font-size:14px;color:var(--muted);margin-top:4px;line-height:1.5' },
      '出席時數達 80% 以上＋完成前後測考試。本測驗對應後測 8 題，主題涵蓋 4 天核心觀念。'));
    intro.append(introLeft);

    const stat = el('div', { class: 'quiz-stat' });
    stat.append(el('div', { class: 'quiz-stat-label' }, '目前分數'));
    stat.append(el('div', { class: 'quiz-stat-value', id: 'quiz-score' }, '— / 8'));
    intro.append(stat);
    root.append(intro);

    // 操作按鈕
    const acts = el('div', { class: 'quiz-actions' });
    const submit = el('button', { class: 'btn primary', id: 'quiz-submit' }, '送出 ／ 即時批改');
    const reset = el('button', { class: 'btn ghost', id: 'quiz-reset' }, '清除作答');
    acts.append(submit, reset);
    root.append(acts);

    // 題目
    const list = el('div', { class: 'quiz-list', id: 'quiz-list' });
    C.quiz.forEach((q, i) => list.append(renderQuestion(q, i)));
    root.append(list);

    // 綁事件
    submit.addEventListener('click', gradeQuiz);
    reset.addEventListener('click', resetQuiz);

    return root;
  }

  function renderQuestion(q, i) {
    const w = el('div', { class: 'question', 'data-q-id': q.id });
    w.append(el('div', { class: 'q-num' }, `第 ${String(i+1).padStart(2,'0')} 題 ｜ ${q.type === 'multi' ? '多選' : '單選'}`));
    w.append(el('div', { class: 'q-text' }, q.q));
    const opts = el('div', { class: 'q-options' });
    q.options.forEach((opt, idx) => {
      const o = el('div', { class: 'q-option', 'data-idx': idx, 'data-multi': q.type === 'multi' });
      o.append(el('div', { class: 'q-option-mark' }));
      o.append(el('div', {}, opt));
      o.addEventListener('click', () => {
        if (q.type === 'multi') {
          o.classList.toggle('checked');
        } else {
          $$('.q-option', opts).forEach(x => x.classList.remove('checked'));
          o.classList.add('checked');
        }
        // 清除批改痕跡
        $$('.q-option', opts).forEach(x => x.classList.remove('correct','wrong'));
        const fb = w.querySelector('.q-feedback');
        if (fb) fb.remove();
        saveQuizAnswers();
      });
      opts.append(o);
    });
    w.append(opts);
    // 還原已存作答
    if (state.quiz && state.quiz[q.id]) {
      const ans = state.quiz[q.id];
      const arr = Array.isArray(ans) ? ans : [ans];
      arr.forEach(idx => {
        const o = opts.querySelector(`.q-option[data-idx="${idx}"]`);
        if (o) o.classList.add('checked');
      });
    }
    return w;
  }

  function getUserAnswer(qEl, q) {
    const checked = $$('.q-option.checked', qEl).map(o => Number(o.dataset.idx));
    if (q.type === 'multi') return checked.sort();
    return checked.length ? checked[0] : null;
  }

  function saveQuizAnswers() {
    const list = $('#quiz-list');
    if (!list) return;
    state.quiz = {};
    C.quiz.forEach(q => {
      const qEl = list.querySelector(`.question[data-q-id="${q.id}"]`);
      const a = getUserAnswer(qEl, q);
      if (a != null && (!Array.isArray(a) || a.length)) state.quiz[q.id] = a;
    });
    store.save(state);
  }

  function isCorrect(q, ans) {
    if (q.type === 'multi') {
      if (!Array.isArray(ans)) return false;
      const right = [...q.answer].sort();
      return ans.length === right.length && ans.every((v,i) => v === right[i]);
    }
    return ans === q.answer;
  }

  function gradeQuiz() {
    let score = 0;
    const list = $('#quiz-list');
    C.quiz.forEach(q => {
      const qEl = list.querySelector(`.question[data-q-id="${q.id}"]`);
      const ans = getUserAnswer(qEl, q);
      // 重新染色
      $$('.q-option', qEl).forEach(o => o.classList.remove('correct','wrong'));
      const correctSet = q.type === 'multi' ? q.answer : [q.answer];
      $$('.q-option', qEl).forEach(o => {
        const idx = Number(o.dataset.idx);
        if (correctSet.includes(idx)) o.classList.add('correct');
        else if (o.classList.contains('checked')) o.classList.add('wrong');
      });
      // 反饋訊息
      const oldFb = qEl.querySelector('.q-feedback');
      if (oldFb) oldFb.remove();
      const ok = isCorrect(q, ans);
      if (ans != null && (!Array.isArray(ans) || ans.length)) {
        if (ok) score++;
        const fb = el('div', { class: 'q-feedback ' + (ok ? 'ok' : 'no') },
          ok ? '✓ 答對 — 把這條觀念記下，可寫進你的 Day 4 Skill。' :
               '✗ 再想想 — 上方綠色為正確答案。回 ' + qIndexToDay(q.id) + ' 章節重新閱讀。');
        qEl.appendChild(fb);
      }
    });
    saveQuizAnswers();
    state.quiz._score = score;
    store.save(state);
    updateQuizScoreUI();
    toast(`得分：${score} / 8 ${score >= 6 ? '— 達結訓標準 ✓' : '— 未達 75 分'}`);
  }

  function qIndexToDay(qid) {
    // 對應到 8 題保留版（移除原 q6 Nano Banana 多選 與 q10 PASA/HSC，後續題目順移）
    const map = {
      q1: 'Day 1 單元 1',     // 生成式 AI 機率預測
      q2: 'Day 1 ／ Day 3',   // Gemini vs NotebookLM
      q3: 'Day 1 單元 2',     // RTFC 四要素
      q4: 'Day 3 單元 1',     // NotebookLM 引用來源
      q5: 'Day 2 單元 2',     // 圖片→影片原理
      q6: 'Day 3 單元 2',     // 規則注入（會計科目分類）
      q7: 'Day 4 單元 1',     // Skill description
      q8: 'Day 1 ／ Day 3'    // Human in the loop
    };
    return map[qid] || '對應章節';
  }

  function updateQuizScoreUI() {
    const elScore = $('#quiz-score');
    if (!elScore) return;
    const s = state.quiz._score;
    if (s == null) {
      elScore.textContent = '— / 8';
      elScore.classList.remove('pass','fail');
      return;
    }
    elScore.textContent = `${s} / 8`;
    elScore.classList.toggle('pass', s >= 6);
    elScore.classList.toggle('fail', s < 6);
  }

  function resetQuiz() {
    if (!confirm('確定要清除所有作答嗎？')) return;
    state.quiz = {};
    store.save(state);
    $$('.q-option').forEach(o => o.classList.remove('checked','correct','wrong'));
    $$('.q-feedback').forEach(f => f.remove());
    updateQuizScoreUI();
    toast('已清除作答');
  }

  // ============================================================
  //  Sidebar：渲染導覽 + 滾動高亮
  // ============================================================
  const NAV_ITEMS = [
    { id: 'overview',           num: '00', label: '課程總覽',       group: '前置' },
    { id: 'shared-case',        num: '01', label: '共用案例設定',   group: '前置' },
    { id: 'day1',               num: 'D1', label: '產業趨勢 + AI 基礎',     group: '4 天課程', meta: '5/13' },
    { id: 'day2',               num: 'D2', label: 'AI 多媒體製作',           group: '4 天課程', meta: '5/20' },
    { id: 'day3',               num: 'D3', label: '行政與財務整理',          group: '4 天課程', meta: '5/27' },
    { id: 'day4',               num: 'D4', label: 'AI 代理 + 成果展示',      group: '4 天課程', meta: '6/3' },
    { id: 'materials-overview', num: 'M',  label: '教學素材總覽',   group: '工具' },
    { id: 'toolbox',            num: 'T',  label: '工具圖鑑',       group: '工具' },
    { id: 'quiz',               num: 'Q',  label: '結訓測驗',       group: '工具' }
  ];

  function renderSidebar() {
    const nav = $('#nav');
    nav.innerHTML = '';
    let lastGroup = '';
    // 依學員可見性開關過濾掉被隱藏的章節（如結訓測驗）
    const visibleItems = NAV_ITEMS.filter(item => SHOW_QUIZ || item.id !== 'quiz');
    visibleItems.forEach(item => {
      if (item.group !== lastGroup) {
        const sec = el('div', { class: 'nav-section' });
        sec.append(el('div', { class: 'nav-section-title' }, item.group));
        nav.append(sec);
        lastGroup = item.group;
      }
      const link = el('a', { class: 'nav-link', href: '#' + item.id, 'data-target': item.id });
      link.append(el('span', { class: 'nav-num' }, item.num));
      link.append(el('span', {}, item.label));
      if (item.meta) link.append(el('span', { class: 'nav-meta' }, item.meta));
      link.addEventListener('click', e => {
        e.preventDefault();
        const target = document.getElementById(item.id);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          history.replaceState(null, '', '#' + item.id);
        }
      });
      nav.lastElementChild.append(link);
    });
  }

  function setupScrollSpy() {
    const observer = new IntersectionObserver((entries) => {
      // 取最靠近頂部的 entry
      const visible = entries.filter(e => e.isIntersecting)
        .sort((a,b) => a.target.getBoundingClientRect().top - b.target.getBoundingClientRect().top);
      if (visible.length === 0) return;
      const id = visible[0].target.id;
      $$('.nav-link').forEach(l => l.classList.toggle('active', l.dataset.target === id));
      const item = NAV_ITEMS.find(i => i.id === id);
      if (item) {
        $('#trail').innerHTML = `<b>${escapeHTML(item.label)}</b>${item.meta ? ' <span style="color:var(--muted-2)">／ ' + item.meta + '</span>' : ''}`;
      }
    }, { rootMargin: '-60px 0px -60% 0px', threshold: 0 });

    $$('section.chapter').forEach(s => observer.observe(s));
  }

  // ============================================================
  //  事件：清除進度
  // ============================================================
  function setupGlobalEvents() {
    $('#reset-btn').addEventListener('click', () => {
      if (!confirm('確定要清除所有任務勾選與測驗作答嗎？此動作無法還原。')) return;
      store.reset();
      state = { tasks: {}, quiz: {} };
      $$('.task-item').forEach(t => t.classList.remove('done'));
      $$('.q-option').forEach(o => o.classList.remove('checked','correct','wrong'));
      $$('.q-feedback').forEach(f => f.remove());
      updateProgressUI();
      updateQuizScoreUI();
      toast('已清除所有進度');
    });
    $('#jump-quiz').addEventListener('click', () => {
      $('#quiz').scrollIntoView({ behavior: 'smooth' });
    });
    $('#theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    });
  }

  // ============================================================
  //  主題（亮 / 暗）— 先讀 localStorage，否則跟系統偏好
  // ============================================================
  const THEME_KEY = 'mor3xppa-theme';
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.setAttribute('aria-label', theme === 'dark' ? '切換到亮主題' : '切換到暗主題');
  }
  function initTheme() {
    let saved = null;
    try { saved = localStorage.getItem(THEME_KEY); } catch (e) {}
    if (saved === 'dark' || saved === 'light') {
      applyTheme(saved);
    } else {
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark ? 'dark' : 'light');
    }
  }

  // ============================================================
  //  章節入場動畫 — IntersectionObserver 觀察首次進入視窗時觸發 fade-in
  //  （加 .fade-in 後 CSS 動畫播一次就停，不會每次滾動都閃）
  // ============================================================
  function setupFadeIn() {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('fade-in');
          io.unobserve(e.target);
        }
      });
    }, { rootMargin: '0px 0px -10% 0px', threshold: 0.05 });
    $$('section.chapter').forEach(s => io.observe(s));
  }

  // ============================================================
  //  init
  // ============================================================
  function init() {
    initTheme();
    const root = $('#main-content');
    root.append(renderOverview());
    root.append(renderSharedCase());
    root.append(renderDay('day1'));
    root.append(renderDay('day2'));
    root.append(renderDay('day3'));
    root.append(renderDay('day4'));
    root.append(renderMaterials());
    root.append(renderToolbox());
    if (SHOW_QUIZ) root.append(renderQuiz());

    renderSidebar();
    setupGlobalEvents();
    updateProgressUI();
    updateQuizScoreUI();
    setupScrollSpy();
    setupFadeIn();

    // 若 URL 有 hash，跳到該章節
    if (location.hash) {
      const t = document.getElementById(location.hash.slice(1));
      if (t) setTimeout(() => t.scrollIntoView({ behavior: 'auto' }), 50);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
