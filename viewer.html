<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>素材檢視 — 工作坊教學素材</title>
<!-- marked.js: 客戶端 markdown 渲染（CDN 鎖版本避免行為飄移） -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<!-- DOMPurify: 在把 marked 輸出注入 DOM 前過濾，降低 XSS 風險 -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<style>
  /* === 變數對齊主站（淺/暗色） === */
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface-2: #f0f2f5;
    --border: #e2e5ec;
    --fg: #1a1d22;
    --muted: #6b7280;
    --accent: #4f7cdb;
    --accent-deep: #2c4fa5;
    --accent-soft: #dbe7ff;
    --success: #16a34a;
    --r-md: 12px;
    --r-sm: 8px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, "Cascadia Mono", monospace;
  }
  [data-theme="dark"] {
    --bg: #14161a;
    --surface: #1c1f25;
    --surface-2: #232831;
    --border: #2d333d;
    --fg: #e7eaf0;
    --muted: #9ba3b1;
    --accent: #6b94e6;
    --accent-deep: #a8c0f0;
    --accent-soft: #1e2c47;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.65;
    font-size: 16px;
  }
  /* === 頂部工具列 === */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: color-mix(in oklab, var(--surface) 92%, transparent);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .topbar a.back {
    color: var(--muted); text-decoration: none; font-size: 14px;
    padding: 6px 12px; border-radius: var(--r-sm);
    transition: background 0.15s;
  }
  .topbar a.back:hover { background: var(--surface-2); color: var(--fg); }
  .topbar h1 {
    flex: 1; margin: 0;
    font-size: 16px; font-weight: 600;
    color: var(--fg);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .topbar .actions { display: flex; gap: 8px; }
  .topbar button, .topbar a.dl {
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--fg);
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.15s ease;
  }
  .topbar button:hover, .topbar a.dl:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--accent-deep);
  }
  .topbar button.copied {
    background: var(--success);
    color: #fff; border-color: var(--success);
  }
  .theme-toggle { padding: 7px 10px !important; }

  /* === 主內容 === */
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  .file-meta {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 24px;
    color: var(--muted);
    font-size: 13px;
  }
  .file-meta .pill {
    padding: 3px 10px; border-radius: 999px;
    background: var(--surface-2); font-family: var(--font-mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  /* === Markdown 樣式 === */
  .md-content h1 { font-size: 28px; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .md-content h2 { font-size: 22px; margin: 28px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .md-content h3 { font-size: 18px; margin: 22px 0 10px; }
  .md-content h4 { font-size: 16px; margin: 18px 0 8px; }
  .md-content p { margin: 10px 0; }
  .md-content ul, .md-content ol { padding-left: 28px; margin: 10px 0; }
  .md-content li { margin: 4px 0; }
  .md-content code {
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono); font-size: 0.9em;
  }
  .md-content pre {
    background: var(--surface-2);
    padding: 14px 16px;
    border-radius: var(--r-sm);
    border: 1px solid var(--border);
    overflow-x: auto;
    line-height: 1.5;
  }
  .md-content pre code {
    background: transparent; padding: 0; font-size: 13px;
  }
  .md-content blockquote {
    border-left: 4px solid var(--accent);
    background: var(--accent-soft);
    margin: 14px 0;
    padding: 10px 16px;
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
    color: var(--fg);
  }
  .md-content blockquote p { margin: 4px 0; }
  .md-content a { color: var(--accent-deep); }
  .md-content table {
    width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 14px;
  }
  .md-content th, .md-content td {
    padding: 8px 12px; border: 1px solid var(--border); text-align: left;
  }
  .md-content th { background: var(--surface-2); font-weight: 600; }
  .md-content hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
  .md-content img { max-width: 100%; height: auto; border-radius: var(--r-sm); }

  /* === CSV 渲染 === */
  .csv-table {
    width: 100%; border-collapse: collapse; font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    overflow: hidden;
  }
  .csv-table th, .csv-table td {
    padding: 8px 12px; border: 1px solid var(--border); text-align: left;
    vertical-align: top;
  }
  .csv-table thead th {
    background: var(--surface-2); font-weight: 600;
    position: sticky; top: 0;
  }
  .csv-table tbody tr:nth-child(even) { background: color-mix(in oklab, var(--surface-2) 50%, transparent); }

  /* === YAML / TXT plain === */
  .raw-content {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 18px 20px;
    font-family: var(--font-mono);
    font-size: 13.5px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* === 載入 / 錯誤狀態 === */
  .state-msg {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  .state-msg.error { color: #c0392b; }
</style>
</head>
<body>
  <!-- 從 localStorage 讀取主題（與主站共用 mor3xppa-progress-v1.theme） -->
  <script>
    (function () {
      try {
        const raw = localStorage.getItem('mor3xppa-progress-v1');
        if (raw) {
          const data = JSON.parse(raw);
          if (data?.theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch (_) { /* ignore */ }
    })();
  </script>

  <header class="topbar">
    <a class="back" href="./" title="返回課程首頁">← 課程首頁</a>
    <h1 id="filename">載入中…</h1>
    <div class="actions">
      <button id="copy-btn" type="button" title="複製全部內容">📋 複製全部</button>
      <a id="download-btn" class="dl" download title="下載原始檔">⬇ 下載原檔</a>
      <button class="theme-toggle" id="theme-toggle" type="button" title="切換亮/暗">🌙</button>
    </div>
  </header>

  <main>
    <div class="file-meta" id="file-meta" hidden>
      <span class="pill" id="file-type">FILE</span>
      <span id="file-path"></span>
    </div>
    <div id="content"></div>
  </main>

<script>
  // === 解析 query param ===
  const params = new URLSearchParams(location.search);
  const file = params.get('file');
  const contentEl = document.getElementById('content');
  const filenameEl = document.getElementById('filename');
  const filePathEl = document.getElementById('file-path');
  const fileTypeEl = document.getElementById('file-type');
  const fileMetaEl = document.getElementById('file-meta');
  const copyBtn = document.getElementById('copy-btn');
  const dlBtn = document.getElementById('download-btn');

  /**
   * 安全地把 HTML 片段插入容器 — 使用 Range.createContextualFragment
   * 並透過 DOMPurify 過濾。所有資料來自同源 assets，仍走 sanitize 多一層防護。
   */
  function setHtml(target, html) {
    const safe = (typeof DOMPurify !== 'undefined') ? DOMPurify.sanitize(html) : html;
    while (target.firstChild) target.removeChild(target.firstChild);
    const range = document.createRange();
    range.selectNodeContents(target);
    const frag = range.createContextualFragment(safe);
    target.appendChild(frag);
  }

  /** 只放純文字（已 escape 過後仍保險的渲染入口） */
  function setText(target, text) {
    while (target.firstChild) target.removeChild(target.firstChild);
    target.appendChild(document.createTextNode(text));
  }

  // 初始狀態：「載入中」純文字
  setText(contentEl, '⌛ 載入中…');
  contentEl.className = 'state-msg';

  if (!file) {
    contentEl.classList.add('error');
    setText(contentEl, '❌ 缺少 file 參數。請從課程頁的素材清單點選。');
  } else {
    loadFile(file);
  }

  /**
   * 主流程：依副檔名選擇渲染策略
   * @param {string} path - 例如「完整課程包/教學素材/品牌調性指南.md」
   */
  async function loadFile(path) {
    const ext = (path.split('.').pop() || '').toLowerCase();
    const filename = decodeURIComponent(path.split('/').pop() || '');
    document.title = filename + ' — 素材檢視';
    filenameEl.textContent = filename;
    filePathEl.textContent = decodeURIComponent(path);
    fileTypeEl.textContent = ext.toUpperCase() || 'FILE';
    fileMetaEl.hidden = false;
    dlBtn.href = path;

    let raw;
    try {
      const resp = await fetch(path);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      raw = await resp.text();
      // 移除可能的 UTF-8 BOM（CSV 為了 Excel 故意加 BOM）
      if (raw.charCodeAt(0) === 0xFEFF) raw = raw.slice(1);
    } catch (err) {
      contentEl.className = 'state-msg error';
      setText(contentEl, '❌ 無法載入檔案：' + err.message);
      return;
    }

    contentEl.className = '';

    if (ext === 'md' || ext === 'markdown') {
      renderMarkdown(raw);
    } else if (ext === 'csv') {
      renderCsv(raw);
    } else {
      // yaml, yml, txt, json, 其他純文字 → pre 顯示
      renderRaw(raw);
    }

    // 複製按鈕：永遠複製「原始文字」，避免 HTML 標籤污染剪貼簿
    copyBtn.addEventListener('click', () => copyText(raw));
  }

  /** 用 marked.js + DOMPurify 渲染 markdown */
  function renderMarkdown(text) {
    if (typeof marked === 'undefined') {
      contentEl.className = 'state-msg error';
      setText(contentEl, 'marked.js 未載入');
      return;
    }
    marked.setOptions({ gfm: true, breaks: false, headerIds: false, mangle: false });
    const html = marked.parse(text);
    const wrapper = document.createElement('article');
    wrapper.className = 'md-content';
    setHtml(wrapper, html);
    while (contentEl.firstChild) contentEl.removeChild(contentEl.firstChild);
    contentEl.appendChild(wrapper);
  }

  /** 將 CSV 渲染成 HTML 表格 */
  function renderCsv(text) {
    const lines = text.split(/\r?\n/).filter(l => l.length);
    if (lines.length === 0) {
      contentEl.className = 'state-msg';
      setText(contentEl, '（空檔）');
      return;
    }
    const rows = lines.map(parseCsvLine);
    const head = rows.shift();
    // 用 createElement 組表格，避免拼 HTML 字串
    const wrap = document.createElement('div');
    wrap.style.overflow = 'auto';
    const tbl = document.createElement('table');
    tbl.className = 'csv-table';
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    head.forEach(c => {
      const th = document.createElement('th');
      th.textContent = c;
      tr.appendChild(th);
    });
    thead.appendChild(tr);
    tbl.appendChild(thead);
    const tbody = document.createElement('tbody');
    rows.forEach(r => {
      const tr2 = document.createElement('tr');
      r.forEach(c => {
        const td = document.createElement('td');
        td.textContent = c;
        tr2.appendChild(td);
      });
      tbody.appendChild(tr2);
    });
    tbl.appendChild(tbody);
    wrap.appendChild(tbl);
    while (contentEl.firstChild) contentEl.removeChild(contentEl.firstChild);
    contentEl.appendChild(wrap);
  }

  /** YAML / TXT / JSON：放 <pre> 保留排版，可選取可複製 */
  function renderRaw(text) {
    const pre = document.createElement('pre');
    pre.className = 'raw-content';
    pre.textContent = text;
    while (contentEl.firstChild) contentEl.removeChild(contentEl.firstChild);
    contentEl.appendChild(pre);
  }

  // === 工具函式 ===
  /** 簡易 CSV 一行解析：支援 "a,b","c""d" 之類引號 */
  function parseCsvLine(line) {
    const out = [];
    let cur = '';
    let inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQuote) {
        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') { inQuote = false; }
        else { cur += ch; }
      } else {
        if (ch === '"') { inQuote = true; }
        else if (ch === ',') { out.push(cur); cur = ''; }
        else { cur += ch; }
      }
    }
    out.push(cur);
    return out;
  }

  async function copyText(text) {
    try {
      await navigator.clipboard.writeText(text);
    } catch (_) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (_) {}
      ta.remove();
    }
    copyBtn.classList.add('copied');
    copyBtn.textContent = '✓ 已複製';
    setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyBtn.textContent = '📋 複製全部';
    }, 1600);
  }

  // === 主題切換（與主站共享 localStorage 的 theme key） ===
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', cur);
    try {
      const k = 'mor3xppa-progress-v1';
      const raw = localStorage.getItem(k);
      const data = raw ? JSON.parse(raw) : {};
      data.theme = cur;
      localStorage.setItem(k, JSON.stringify(data));
    } catch (_) {}
  });
</script>
</body>
</html>
