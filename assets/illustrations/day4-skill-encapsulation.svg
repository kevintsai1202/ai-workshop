<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Agent Skill 結構：資料夾 + SKILL.md（YAML frontmatter + Markdown body），透過 progressive disclosure 在 agent runtime 觸發">
  <title>Agent Skill 結構（agentskills.io 官方規範）</title>
  <desc>左側顯示 Skill 三層結構（資料夾、metadata 必填欄位 name + description、Markdown 指令本體），中央顯示打包後的 SKILL.md 文件，右側顯示 agent runtime 透過 progressive disclosure 三階段（Discovery → Activation → Execution）觸發 skill。</desc>

  <!-- 階段標籤 -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="700" letter-spacing="1" fill="currentColor" opacity="0.65">
    <text x="50" y="40">STRUCTURE · 三層</text>
    <text x="265" y="40">SKILL.md · 封裝</text>
    <text x="455" y="40">RUNTIME · Agent</text>
  </g>

  <!-- ====== 左側：三層結構卡 ====== -->
  <g transform="translate(40 60)">
    <!-- 資料夾 -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="170" height="80" rx="10" fill="rgba(255,255,255,0.6)" stroke="currentColor" stroke-width="2"/>
      <!-- icon: 資料夾 -->
      <g transform="translate(28 40)" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-12 -8 L -4 -8 L 0 -4 L 12 -4 L 12 10 L -12 10 Z"/>
      </g>
      <text x="58" y="28" font-family="inherit" font-size="13" font-weight="700" fill="currentColor">資料夾</text>
      <text x="58" y="46" font-family="inherit" font-size="10" fill="currentColor" opacity="0.7">名稱 = name 欄位</text>
      <text x="58" y="64" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.55">invoice-to-excel/</text>
    </g>

    <!-- metadata (YAML frontmatter) -->
    <g transform="translate(0 100)">
      <rect x="0" y="0" width="170" height="80" rx="10" fill="rgba(255,255,255,0.6)" stroke="currentColor" stroke-width="2"/>
      <!-- icon: tag/metadata -->
      <g transform="translate(28 40)" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M-12 -8 L 4 -8 L 12 0 L 4 8 L -12 8 Z"/>
        <circle cx="-6" cy="0" r="2" fill="currentColor"/>
      </g>
      <text x="58" y="22" font-family="inherit" font-size="13" font-weight="700" fill="currentColor">metadata（必填）</text>
      <text x="58" y="40" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.7">name: invoice-to-excel</text>
      <text x="58" y="54" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.7">description: ...</text>
      <text x="58" y="70" font-family="inherit" font-size="9" fill="currentColor" opacity="0.55">做什麼 + 何時用</text>
    </g>

    <!-- Markdown body -->
    <g transform="translate(0 200)">
      <rect x="0" y="0" width="170" height="80" rx="10" fill="rgba(255,255,255,0.6)" stroke="currentColor" stroke-width="2"/>
      <!-- icon: document lines -->
      <g transform="translate(28 40)" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="-10" y="-12" width="20" height="24" rx="2"/>
        <line x1="-6" y1="-6" x2="6" y2="-6"/>
        <line x1="-6" y1="-1" x2="6" y2="-1"/>
        <line x1="-6" y1="4" x2="6" y2="4"/>
        <line x1="-6" y1="9" x2="2" y2="9"/>
      </g>
      <text x="58" y="28" font-family="inherit" font-size="13" font-weight="700" fill="currentColor">Markdown body</text>
      <text x="58" y="46" font-family="inherit" font-size="10" fill="currentColor" opacity="0.7">指令本體（必填）</text>
      <text x="58" y="64" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.55">步驟 / 規則 / 邊界</text>
    </g>
  </g>

  <!-- 連線：三層結構 → SKILL.md -->
  <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 4" opacity="0.5">
    <path d="M220 100 Q 250 120 270 200"/>
    <path d="M220 200 L 270 200"/>
    <path d="M220 300 Q 250 280 270 200"/>
  </g>

  <!-- ====== 中央：SKILL.md 文件 ====== -->
  <g transform="translate(270 110)">
    <!-- 文件主體 -->
    <rect x="0" y="0" width="140" height="180" rx="8" fill="rgba(255,255,255,0.85)" stroke="currentColor" stroke-width="2.5"/>
    <!-- 文件折角 -->
    <path d="M120 0 L 140 20 L 120 20 Z" fill="currentColor" opacity="0.18" stroke="currentColor" stroke-width="2"/>

    <!-- frontmatter 區（黃色高亮） -->
    <rect x="8" y="32" width="124" height="44" rx="3" fill="currentColor" opacity="0.12"/>
    <g font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.85">
      <text x="14" y="44">---</text>
      <text x="14" y="56">name: invoice-to-excel</text>
      <text x="14" y="66">description: ...</text>
      <text x="14" y="76">---</text>
    </g>

    <!-- body 區 -->
    <g font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.65">
      <text x="14" y="92" font-weight="700"># 發票自動整理</text>
      <text x="14" y="106">## 角色與任務</text>
      <text x="14" y="118">你是財務稽核專員...</text>
      <text x="14" y="132">## 處理規則</text>
      <text x="14" y="144">1. 報支科目分類</text>
      <text x="14" y="156">2. 合規檢查 (150 元)</text>
      <text x="14" y="168">3. 無法辨識...</text>
    </g>

    <!-- 文件名標籤 -->
    <text x="70" y="20" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="11" font-weight="700" fill="currentColor">SKILL.md</text>
  </g>

  <!-- 連線：SKILL.md → Agent -->
  <g transform="translate(410 0)" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 200 L 50 200" stroke-dasharray="4 4" opacity="0.55"/>
    <path d="M42 194 L 52 200 L 42 206"/>
  </g>

  <!-- progressive disclosure 三階段標註 -->
  <g transform="translate(415 165)" font-family="inherit" font-size="8" fill="currentColor" opacity="0.6">
    <text x="0" y="0">Discovery</text>
    <text x="0" y="12">→ Activation</text>
    <text x="0" y="24">→ Execution</text>
  </g>

  <!-- ====== 右側：Agent Runtime ====== -->
  <g transform="translate(465 110)">
    <rect x="0" y="0" width="115" height="170" rx="10" fill="rgba(255,255,255,0.65)" stroke="currentColor" stroke-width="2"/>
    <!-- 視窗 dots -->
    <g fill="currentColor" opacity="0.5">
      <circle cx="12" cy="12" r="3"/>
      <circle cx="22" cy="12" r="3"/>
      <circle cx="32" cy="12" r="3"/>
    </g>
    <!-- 視窗分隔 -->
    <line x1="0" y1="22" x2="115" y2="22" stroke="currentColor" stroke-width="1.5"/>
    <!-- 視窗內容 -->
    <g transform="translate(8 32)">
      <rect x="0" y="0" width="99" height="18" rx="3" fill="currentColor" opacity="0.16"/>
      <text x="6" y="12" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.85">&gt; /skills</text>

      <rect x="2" y="24" width="95" height="14" rx="2" fill="rgba(255,255,255,0.85)" stroke="currentColor" stroke-width="1"/>
      <text x="6" y="34" font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.75">@skill-creator</text>

      <rect x="2" y="42" width="95" height="14" rx="2" fill="rgba(255,255,255,0.85)" stroke="currentColor" stroke-width="1"/>
      <text x="6" y="52" font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.75">@invoice-to-excel</text>

      <rect x="2" y="60" width="95" height="14" rx="2" fill="rgba(255,255,255,0.85)" stroke="currentColor" stroke-width="1"/>
      <text x="6" y="70" font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.75">@meeting-summary</text>

      <rect x="2" y="78" width="95" height="14" rx="2" fill="rgba(255,255,255,0.85)" stroke="currentColor" stroke-width="1"/>
      <text x="6" y="88" font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.75">@faq-bot</text>
    </g>
    <text x="58" y="160" text-anchor="middle" font-family="inherit" font-size="10" font-weight="700" fill="currentColor">Codex / Claude</text>
  </g>

  <!-- 底部註記 -->
  <text x="300" y="380" text-anchor="middle" font-family="inherit" font-size="11" fill="currentColor" opacity="0.55">資料夾 + SKILL.md → progressive disclosure → Agent 一鍵呼叫</text>
</svg>
