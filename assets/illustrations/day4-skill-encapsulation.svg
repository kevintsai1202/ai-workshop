<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Agent Skill 三要素：Input、Output、Trigger 封裝成可重用 Skill">
  <title>Agent Skill 封裝</title>
  <desc>三個輸入要素 Input、Output、Trigger 由左方匯入中央的 Skill 包裝盒；右方輸出可重用的 Skill，被 Antigravity 的 Agent 環境呼叫使用。</desc>

  <!-- 階段標籤 -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="10" font-weight="700" letter-spacing="1" fill="currentColor" opacity="0.65">
    <text x="50" y="40">三要素</text>
    <text x="265" y="40">SKILL · 封裝</text>
    <text x="465" y="40">RUNTIME · Antigravity</text>
  </g>

  <!-- ====== 三要素卡（左） ====== -->
  <g transform="translate(40 60)">
    <!-- Input -->
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="160" height="80" rx="10" fill="rgba(255,255,255,0.6)" stroke="currentColor" stroke-width="2"/>
      <!-- icon: 下載/輸入箭頭 -->
      <g transform="translate(28 40)" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 -10 L 0 10"/>
        <path d="M-6 4 L 0 10 L 6 4"/>
        <line x1="-12" y1="14" x2="12" y2="14"/>
      </g>
      <text x="58" y="32" font-family="inherit" font-size="14" font-weight="700" fill="currentColor">Input</text>
      <text x="58" y="50" font-family="inherit" font-size="10" fill="currentColor" opacity="0.7">輸入</text>
      <text x="58" y="66" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.55">發票照片 / 檔案</text>
    </g>

    <!-- Output -->
    <g transform="translate(0 100)">
      <rect x="0" y="0" width="160" height="80" rx="10" fill="rgba(255,255,255,0.6)" stroke="currentColor" stroke-width="2"/>
      <!-- icon: 輸出箭頭 -->
      <g transform="translate(28 40)" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="-12" y1="-14" x2="12" y2="-14"/>
        <path d="M0 -10 L 0 10"/>
        <path d="M-6 -4 L 0 -10 L 6 -4"/>
      </g>
      <text x="58" y="32" font-family="inherit" font-size="14" font-weight="700" fill="currentColor">Output</text>
      <text x="58" y="50" font-family="inherit" font-size="10" fill="currentColor" opacity="0.7">輸出</text>
      <text x="58" y="66" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.55">Excel / Markdown</text>
    </g>

    <!-- Trigger -->
    <g transform="translate(0 200)">
      <rect x="0" y="0" width="160" height="80" rx="10" fill="rgba(255,255,255,0.6)" stroke="currentColor" stroke-width="2"/>
      <!-- icon: 閃電 -->
      <g transform="translate(28 40)" stroke="currentColor" stroke-width="2" fill="currentColor" fill-opacity="0.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 -14 L -8 4 L 2 4 L -2 14 L 8 -4 L 2 -4 Z"/>
      </g>
      <text x="58" y="32" font-family="inherit" font-size="14" font-weight="700" fill="currentColor">Trigger</text>
      <text x="58" y="50" font-family="inherit" font-size="10" fill="currentColor" opacity="0.7">觸發條件</text>
      <text x="58" y="66" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.55">description = AI 路由器</text>
    </g>
  </g>

  <!-- 連線：三要素 → Skill 盒 -->
  <g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 4" opacity="0.5">
    <path d="M210 100 Q 250 100 270 200"/>
    <path d="M210 200 L 270 200"/>
    <path d="M210 300 Q 250 300 270 200"/>
  </g>

  <!-- ====== 中央 Skill 包裝盒 ====== -->
  <g transform="translate(270 130)">
    <!-- 盒子主體 -->
    <rect x="0" y="0" width="140" height="140" rx="14" fill="rgba(255,255,255,0.75)" stroke="currentColor" stroke-width="2.5"/>
    <!-- 包裝紙效果：頂部緞帶 -->
    <rect x="0" y="0" width="140" height="20" fill="currentColor" opacity="0.2"/>
    <line x1="0" y1="20" x2="140" y2="20" stroke="currentColor" stroke-width="2"/>
    <!-- 盒子中央 YAML 角標 -->
    <g transform="translate(70 70)">
      <rect x="-26" y="-22" width="52" height="38" rx="4" fill="rgba(255,255,255,0.9)" stroke="currentColor" stroke-width="1.8"/>
      <g font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.85">
        <text x="-22" y="-10">name:</text>
        <text x="-22" y="0">desc:</text>
        <text x="-22" y="10">steps:</text>
      </g>
      <text x="0" y="32" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" font-weight="700" fill="currentColor" opacity="0.7">.yaml</text>
    </g>
    <!-- 盒子標籤 -->
    <text x="70" y="130" text-anchor="middle" font-family="inherit" font-size="13" font-weight="700" fill="currentColor">SKILL</text>
  </g>

  <!-- 連線：Skill → Antigravity -->
  <g transform="translate(410 0)" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 200 L 60 200" stroke-dasharray="4 4" opacity="0.55"/>
    <path d="M52 194 L 62 200 L 52 206"/>
  </g>

  <!-- ====== 右側：Antigravity 執行環境 ====== -->
  <g transform="translate(470 130)">
    <rect x="0" y="0" width="110" height="140" rx="10" fill="rgba(255,255,255,0.65)" stroke="currentColor" stroke-width="2"/>
    <!-- 視窗 dots -->
    <g fill="currentColor" opacity="0.5">
      <circle cx="12" cy="12" r="3"/>
      <circle cx="22" cy="12" r="3"/>
      <circle cx="32" cy="12" r="3"/>
    </g>
    <!-- 視窗分隔 -->
    <line x1="0" y1="22" x2="110" y2="22" stroke="currentColor" stroke-width="1.5"/>
    <!-- 視窗內容：agent + skill -->
    <g transform="translate(10 36)">
      <rect x="0" y="0" width="90" height="20" rx="3" fill="currentColor" opacity="0.16"/>
      <text x="6" y="14" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="currentColor" opacity="0.85">&gt; agent run</text>

      <rect x="6" y="28" width="78" height="14" rx="2" fill="rgba(255,255,255,0.85)" stroke="currentColor" stroke-width="1"/>
      <text x="10" y="38" font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.75">@invoice</text>

      <rect x="6" y="46" width="78" height="14" rx="2" fill="rgba(255,255,255,0.85)" stroke="currentColor" stroke-width="1"/>
      <text x="10" y="56" font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.75">@meeting</text>

      <rect x="6" y="64" width="78" height="14" rx="2" fill="rgba(255,255,255,0.85)" stroke="currentColor" stroke-width="1"/>
      <text x="10" y="74" font-family="ui-monospace, Menlo, monospace" font-size="8" fill="currentColor" opacity="0.75">@faq-bot</text>
    </g>
    <text x="55" y="130" text-anchor="middle" font-family="inherit" font-size="11" font-weight="700" fill="currentColor">Antigravity</text>
  </g>

  <!-- 底部註記 -->
  <text x="300" y="380" text-anchor="middle" font-family="inherit" font-size="11" fill="currentColor" opacity="0.55">提示詞 → 封裝成 Skill → 桌面 Agent 一鍵呼叫</text>
</svg>
